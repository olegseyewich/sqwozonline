appId: dev.concord.desktop
productName: Concord
copyright: Concord (open source)
# Pinned because electron is hoisted to the workspace-root node_modules,
# so electron-builder can't auto-detect the version from client/.
electronVersion: 33.4.11
directories:
  output: release
  buildResources: build
# Renderer is bundled by Vite (dist/), and the Electron main/preload are
# bundled by esbuild (dist-electron/, electron-updater inlined) — so no
# node_modules need packaging.
files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
asar: true
npmRebuild: false
buildDependenciesFromSource: false
# Auto-update source: this repo's GitHub Releases (public, so no auth needed).
publish:
  provider: github
  owner: olegseyewich
  repo: sqwozonline
  releaseType: release
win:
  icon: build/icon.ico
  target:
    - nsis
    - portable
mac:
  target:
    - dmg
  category: public.app-category.social-networking
linux:
  target:
    - AppImage
  category: Network
nsis:
  oneClick: true            # run → installs → launches, no prompts
  perMachine: false         # per-user install, no admin needed
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: true
  shortcutName: Concord
